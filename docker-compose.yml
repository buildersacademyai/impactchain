version: "3.9"

# ImpactChain Protocol — Self-hosted stack
# Any NGO can run this with: docker-compose up
# This is what makes us a genuine Digital Public Good.

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       impactchain
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV:                     production
      PORT:                         3001
      DATABASE_URL:                 postgresql://postgres:${POSTGRES_PASSWORD:-changeme}@postgres:5432/impactchain
      REDIS_URL:                    redis://redis:6379
      JWT_SECRET:                   ${JWT_SECRET}
      CELO_RPC_URL:                 ${CELO_RPC_URL:-https://alfajores-forno.celo-testnet.org}
      PRIVATE_KEY:                  ${PRIVATE_KEY}
      PASSPORT_REGISTRY_ADDRESS:    ${PASSPORT_REGISTRY_ADDRESS}
      DISBURSE_ADDRESS:             ${DISBURSE_ADDRESS}
      ORACLE_CORE_ADDRESS:          ${ORACLE_CORE_ADDRESS}
      CUSD_ADDRESS:                 ${CUSD_ADDRESS}
      FRONTEND_URL:                 ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL:                      ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_CELO_CHAIN:                   ${NEXT_PUBLIC_CELO_CHAIN:-alfajores}
      NEXT_PUBLIC_PASSPORT_REGISTRY_ADDRESS:    ${PASSPORT_REGISTRY_ADDRESS}
      NEXT_PUBLIC_DISBURSE_ADDRESS:             ${DISBURSE_ADDRESS}
      NEXT_PUBLIC_ORACLE_CORE_ADDRESS:          ${ORACLE_CORE_ADDRESS}
      NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID:     ${WALLETCONNECT_PROJECT_ID}
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
